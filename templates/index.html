<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
    body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background-color: rgb(208, 244, 244);
    }

    .container {
        background-color: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    h1 {
        text-align: center;
        color: rgb(0, 0, 0);
        font-family: Arial, sans-serif;
        margin-bottom: 50px;
    }

    .input_name {
        font-size: 18px;
    }
</style>

<body>

    <div class="container" id="form">

        <div>
            <h1>Diabetes Prediction Form</h1>

        </div>

        <form id="predictionForm" onsubmit="submitForm(event)">

            <label for="gender" class="input_name">Gender</label>
            <select name="gender" id="gender" required>
                <option value="">-- Select Gender --</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select><br><br>
            <label for="age" class="input_name">Age:</label>
            <input type="number" id="age" name="age" required min="0" max="120"><br><br>

            <label for="hypertension" class="input_name">Hypertension:</label>
            <input type="checkbox" id="hypertension" name="hypertension" value="1"><br><br>

            <label for="heart_disease" class="input_name">Heart Disease:</label>
            <input type="checkbox" id="heart_disease" name="heart_disease" value="1"><br><br>

            <label for="smoking_history" class="input_name">Smoking History:</label>
            <select name="smoking_history" id="smoking_history" required>
                <option value="">-- Select Smoking History --</option>
                <option value="Never">Never</option>
                <option value="Former">Former</option>
                <option value="Current">Current</option>
            </select><br><br>

            <label for="bmi" class="input_name">BMI:</label>
            <input type="number" id="bmi" name="bmi" step="0.1" required min="0" max="100"><br><br>

            <label for="HbA1c_level" class="input_name">HbA1c Level:</label>
            <input type="number" id="HbA1c_level" name="HbA1c_level" step="0.1" required min="0"><br><br>

            <label for="blood_glucose_level" class="input_name">Blood Glucose Level:</label>
            <input type="number" id="blood_glucose_level" name="blood_glucose_level" required min="0"><br><br>

            <input type="submit" value="Submit">
        </form>

    </div>

    <div id="result">
        <h1>Prediction Result: <span id="result-value"></span></h1>
        <button onclick="goBack();">Go Back</button>

    </div>

</body>


<script>

    const formContainer = document.getElementById('form');
    const resultValue = document.getElementById('result-value');
    const resultContainer = document.getElementById('result');
    const predictionForm = document.getElementById('predictionForm');

    // Initially show form, hide result
    formContainer.style.display = 'block';
    resultContainer.style.display = 'none';

    function submitForm(event) {
        event.preventDefault();
        
        // Create FormData from the form
        const formData = new FormData(predictionForm);
        
        // Handle unchecked checkboxes - set to 0 if not checked
        if (!formData.has('hypertension')) {
            formData.set('hypertension', '0');
        }
        if (!formData.has('heart_disease')) {
            formData.set('heart_disease', '0');
        }
        
        // Submit via AJAX
        fetch('/predict', {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            if (data.error) {
                alert('Error: ' + data.error);
            } else {
                displayResult(data.prediction);
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert('An error occurred during prediction');
        });
    }

    function displayResult(prediction) {
        resultValue.textContent = prediction;
        formContainer.style.display = 'none';
        resultContainer.style.display = 'block';
    }
    
    function goBack() {
        window.location.href = '/';
    }

</script>

</html>
